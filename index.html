<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My GitHub Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #333;
      text-align: center;
    }
    header {
      background: #4a90e2;
      color: white;
      padding: 2rem 1rem;
    }
    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }
    section {
      padding: 2rem;
      max-width: 800px;
      margin: auto;
    }
    footer {
      background: #222;
      color: #aaa;
      padding: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Network Security Organization FIU</h1>
    <nav>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section id="about">
    <h2>Discord</h2>
    <img src="https://www.pngmart.com/files/22/Discord-Logos-PNG-Clipart-200x200.png" alt="External image">
    <p>Click here to join the NSO Discord!👆.</p>
  </section>

  <section id="projects">
    <h2>WhatsApp</h2>
    <a href="https://your-link-here.com">
  <img class="imgButton"
       src="https://images.seeklogo.com/logo-png/47/3/whatsapp-logo-png_seeklogo-477609.png"
       alt="WhatsApp Logo">
</a>

<style>
  .imgButton {
    cursor: pointer;
    transition: transform 0.2s;
  }
  .imgButton:hover {
    transform: scale(1.1);
  }
</style>
    <p>Click here to join the NSO WhatsApp Group Chat!👆.</p>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>Email: you@example.com</p>
  </section>

  <footer>
    &copy; 2026 NSO FIU — Built on GitHub Pages
  </footer>

</html>
